<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="nkvk">
<meta property="og:description" content="а от этой картинки будет потанцевал?">
<meta property="og:image" content="https://nkvk4d.ru/og-image.png">
<meta property="og:url" content="https://nkvk.ru/index.html">
<meta name="twitter:card" content="summary_large_image">
    <title>Перенаправление...</title>
    <link rel="canonical" href="https://nkvk4d.ru/">
    <meta http-equiv="refresh" content="0; url=https://nkvk4d.ru/">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: rgba(22, 22, 22, 0.7); 
            --accent-color: #ff3333;
            --text-main: #e0e0e0;
            --text-dim: #777777;
            --link-color: #ff5555;
            --font-mono: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(to right, #151515 1px, transparent 1px),
                linear-gradient(to bottom, #151515 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: var(--font-mono);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.5); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 15px rgba(255, 51, 51, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .redirect-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .loader {
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 25px auto;
            animation: pulse 1.5s infinite ease-in-out;
        }

        h1 {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #fff;
        }

        p {
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px dashed var(--link-color);
            transition: all 0.2s ease;
        }

        a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        ::selection {
            background: var(--accent-color);
            color: #000;
        }
    </style>
    
    <script type="text/javascript">
        window.location.href = "https://nkvk4d.ru/";
    </script>
</head>
<body>

    <div class="redirect-card">
        <div class="loader"></div>
        <h1>Перенаправление</h1>
        <p>Если ваш браузер застрял, <a href="https://nkvk4d.ru/">нажмите сюда</a> для перехода на nkvk4d.ru.</p>
    </div>

</body>
</html>
